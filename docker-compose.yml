services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: optimal
      POSTGRES_PASSWORD: optimal_dev_password
      POSTGRES_DB: optimal_finances
    volumes:
      - optimal_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optimal -d optimal_finances"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  optimal_pg_data:
